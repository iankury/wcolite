<html>
<head>
  <title>Updating...</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 100vw;
      height: 100vh;
      background-color: #0F0F0F;
      color: #FFFFF0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      text-align: center;
      padding: 0 5vw;
    }
    p {
      font-family: sans-serif;
      font-size: 6vw;
    }
  </style>
</head>
<body>
  <p id="status">Atualizando...</p>
  <script>
    function poll() {
      fetch("/update-status")
        .then((res) => res.json())
        .then((data) => {
          var el = document.getElementById("status");
          el.textContent = data.status;
          if (data.status !== "Concluído" && data.status.indexOf("Erro") !== 0) {
            setTimeout(poll, 1000);
          }
        })
        .catch(() => {
          setTimeout(poll, 1000);
        });
    }
    poll();
  </script>
</body>
</html>
